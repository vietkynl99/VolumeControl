<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Volume Control</title>
<style>
  :root {
    --bg: #0b0b0e;
    --card-bg: rgba(255, 255, 255, 0.035);
    --card-border: rgba(255, 255, 255, 0.08);
    --text-primary: #f4f4f6;
    --text-secondary: #8b8b93;
    --text-tertiary: #616168;
    --divider: rgba(255, 255, 255, 0.07);
    --accent-1: #7c6cf0;
    --accent-2: #5b8def;
    --accent-glow: rgba(124, 108, 240, 0.35);
    --track-bg: rgba(255, 255, 255, 0.09);
    --thumb: #ffffff;
    --danger: #f0645b;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f4f6;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(0, 0, 0, 0.06);
      --text-primary: #1a1a1e;
      --text-secondary: #6e6e76;
      --text-tertiary: #9a9aa1;
      --divider: rgba(0, 0, 0, 0.06);
      --track-bg: rgba(0, 0, 0, 0.08);
      --thumb: #ffffff;
    }
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    width: 288px;
    padding: 14px;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto,
      Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 18px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5);
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .icon-badge {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(155deg, var(--accent-1), var(--accent-2));
    box-shadow: 0 6px 16px -4px var(--accent-glow);
  }

  .icon-badge svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
  }

  .title-group {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }

  .title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 11.5px;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .volume-display {
    display: flex;
    align-items: baseline;
    gap: 2px;
    margin-bottom: 14px;
  }

  .volume-display #val {
    font-size: 38px;
    font-weight: 650;
    color: var(--text-primary);
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .volume-display .unit {
    font-size: 17px;
    font-weight: 550;
    color: var(--text-tertiary);
    letter-spacing: -0.01em;
  }

  .slider-wrap {
    margin-bottom: 18px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: var(--track-bg);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--thumb);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 0, 0, 0.04);
    transition: transform 0.12s ease;
  }

  input[type="range"]:active::-webkit-slider-thumb {
    transform: scale(1.12);
  }

  input[type="range"]:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .divider {
    height: 1px;
    background: var(--divider);
    margin: 0 0 14px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 6px 10px;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    background: var(--track-bg);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 550;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
  }

  .btn:hover {
    background: rgba(255, 255, 255, 0.14);
  }

  @media (prefers-color-scheme: light) {
    .btn:hover {
      background: rgba(0, 0, 0, 0.08);
    }
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn svg {
    width: 13px;
    height: 13px;
    stroke: currentColor;
    flex-shrink: 0;
  }

  .mute-btn.is-muted {
    background: linear-gradient(155deg, var(--danger), #d1453b);
    border-color: transparent;
    color: #fff;
  }

  .mute-btn.is-muted:hover {
    background: linear-gradient(155deg, #f0645b, var(--danger));
  }

  .mute-btn .mute-off-icon {
    display: none;
  }

  .mute-btn.is-muted .mute-on-icon {
    display: none;
  }

  .mute-btn.is-muted .mute-off-icon {
    display: block;
  }

  .footer-hint {
    margin-top: 12px;
    padding: 0 4px;
    font-size: 10.5px;
    line-height: 1.45;
    color: var(--text-tertiary);
    letter-spacing: -0.005em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon-badge">
        <svg id="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5 6 9H2v6h4l5 4V5Z"></path>
          <path id="wave1" d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          <path id="wave2" d="M18.5 5.5a9 9 0 0 1 0 13"></path>
        </svg>
      </div>
      <div class="title-group">
        <div class="title">Volume Control</div>
        <div class="subtitle" id="subtitle">Loading…</div>
      </div>
    </div>

    <div class="volume-display">
      <span id="val">100</span><span class="unit">%</span>
    </div>

    <div class="slider-wrap">
      <input type="range" id="slider" min="0" max="100" value="100" />
    </div>

    <div class="divider"></div>

    <div class="btn-row">
      <button type="button" id="muteBtn" class="btn mute-btn">
        <svg class="mute-on-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5 6 9H2v6h4l5 4V5Z"></path>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
        </svg>
        <svg class="mute-off-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5 6 9H2v6h4l5 4V5Z"></path>
          <path d="m17 9 5 6"></path>
          <path d="m22 9-5 6"></path>
        </svg>
        <span id="muteBtnLabel">Mute</span>
      </button>
      <button type="button" id="resetBtn" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
        <span>Reset</span>
      </button>
    </div>
  </div>
  <div class="footer-hint" id="footerHint">Applies instantly to every tab on this site, and any tab opened on it afterward.</div>

  <script src="popup.js"></script>
</body>
</html>
